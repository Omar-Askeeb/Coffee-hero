name: app_for_me
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  pdf: ^3.11.0
  printing: ^5.13.4
  path_provider: ^2.1.2
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  onesignal_flutter: ^5.1.2
  http: ^1.2.0
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.6
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
